root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/main ./cmd/"
  bin = "tmp/main"
  full_bin = "tmp/main"
  include_ext = ["go", "tpl", "tmpl", "html"]
  exclude_dir = ["tmp", "vendor", "testdata", "migrations"]
  include_dir = ["cmd", "internal", "pkg", "config"]
  exclude_file = []
  exclude_regex = []
  exclude_unchanged = false
  follow_symlink = false
  log = "build-errors.log"
  poll = false
  poll_interval = 0
  stop_on_error = true
  send_interrupt = true
  kill_delay = 500
  rerun = false
  rerun_delay = 500

[log]
  time = true

[color]
  main = "cyan"
  watcher = "green"
  build = "yellow"
  runner = "magenta"
