name: eduplay-staging

services:
  api:
    image: ghcr.io/agambondan/eduplay/api:staging
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - eduplay-network
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:8080/swagger/index.html']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  web:
    image: ghcr.io/agambondan/eduplay/web:staging
    env_file: .env
    depends_on:
      api:
        condition: service_healthy
    networks:
      - eduplay-network
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3000']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  nginx:
    image: nginx:1.27-alpine
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/staging.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - eduplay-network
    restart: always
    logging:
      driver: json-file
      options:
        max-size: '5m'
        max-file: '2'

  postgres:
    image: pgvector/pgvector:pg18
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - eduplay-network
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-admin} -d ${DB_NAME:-edugame}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  redis:
    image: redis:8-alpine
    env_file: .env
    volumes:
      - redis_data:/data
    networks:
      - eduplay-network
    restart: always
    deploy:
      resources:
        limits:
          memory: 128M
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: '5m'
        max-file: '2'

volumes:
  postgres_data:
  redis_data:

networks:
  eduplay-network:
    driver: bridge
