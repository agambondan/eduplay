services:
  postgres:
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_DB: edugame
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7.4-alpine
    ports:
      - "6380:6379"

volumes:
  postgres_data:
